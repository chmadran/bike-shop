minimumReleaseAgeExclude:
  - eve
  - "@tybys/wasm-util"
strictDepBuilds: false
ignoredBuiltDependencies:
  - "@mongodb-js/zstd"
  - node-liblzma
  - sharp
# Compatibility for eve releases with an incomplete runtime manifest.
packageExtensions:
  "eve@>=0.6.0-beta.13 <=0.7.0":
    dependencies:
      oxc-parser: 0.134.0
patchedDependencies:
  nitro@3.0.260610-beta: patches/nitro@3.0.260610-beta.patch
allowBuilds:
  '@mongodb-js/zstd': set this to true or false
  node-liblzma: set this to true or false
