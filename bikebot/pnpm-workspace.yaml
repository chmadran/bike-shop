minimumReleaseAgeExclude:
  - eve
  - "@tybys/wasm-util"
allowBuilds:
  '@mongodb-js/zstd': set this to true or false
  node-liblzma: set this to true or false
  sharp: false
# Compatibility for eve releases with an incomplete runtime manifest.
packageExtensions:
  "eve@>=0.6.0-beta.13 <=0.7.0":
    dependencies:
      oxc-parser: 0.134.0
